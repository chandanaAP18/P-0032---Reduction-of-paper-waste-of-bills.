<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Smart Billing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-card">
    <h1>Login</h1>
    <p>Welcome back. Enter your details to access Smart Billing.</p>
    <form id="login-form" class="form-card">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter password" required>

      <button type="submit" class="button primary">Login</button>
    </form>
    <div id="login-message" class="status-message" aria-live="polite"></div>
    <div class="form-footer">
      <p>New to Smart Billing? <a href="signup.html">Sign up</a></p>
      <a class="text-link" href="index.html">Back to Home</a>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(event) {
      event.preventDefault();
      const message = document.getElementById('login-message');
      message.textContent = 'You are logged in successfully.';
      message.classList.add('status-message--visible');
      setTimeout(() => {
        window.location.href = 'app.html';
      }, 900);
    });
  </script>
</body>
</html>
